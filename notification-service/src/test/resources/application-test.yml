spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  cloud:
    discovery:
      enabled: false
eureka:
  client:
    enabled: false
jwt:
  secret: test-secret-key-minimum-256-bits-for-hmac-sha256-algorithm-here
  expiration: 86400000
  refresh-expiration: 604800000
