<div class="container py-4" style="max-width:640px;">

  <div class="d-flex align-items-center mb-4">
    <button class="btn btn-outline-secondary me-3" (click)="router.navigate(['/profile', userId])">
      ← Back
    </button>
    <h4 class="fw-bold mb-0">Edit Profile</h4>
  </div>

  <!-- Loading -->
  <div *ngIf="pageLoading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <div *ngIf="!pageLoading">
    <div class="alert alert-success d-flex align-items-center" *ngIf="saved">
      ✅ Profile updated! Redirecting...
    </div>
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <div class="card shadow-sm">
      <div class="card-body p-4">

        <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">

          <div class="row g-3 mb-3">
            <div class="col">
              <label class="form-label fw-semibold">First Name</label>
              <input type="text" class="form-control" formControlName="firstName" placeholder="First name">
            </div>
            <div class="col">
              <label class="form-label fw-semibold">Last Name</label>
              <input type="text" class="form-control" formControlName="lastName" placeholder="Last name">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Bio</label>
            <textarea class="form-control" rows="3" formControlName="bio"
                      placeholder="Tell people about yourself..."></textarea>
            <div class="form-text">Max 250 characters</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">📍 Location</label>
            <input type="text" class="form-control" formControlName="location"
                   placeholder="City, Country">
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">🌐 Website</label>
            <input type="url" class="form-control" formControlName="website"
                   placeholder="https://yourwebsite.com">
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">🔒 Privacy</label>
            <select class="form-select" formControlName="privacy">
              <option value="PUBLIC">Public – Anyone can see my profile</option>
              <option value="PRIVATE">Private – Only connections can see</option>
            </select>
          </div>

          <div class="d-flex justify-content-end gap-3">
            <button type="button" class="btn btn-outline-secondary"
                    (click)="router.navigate(['/profile', userId])">
              Cancel
            </button>
            <button type="submit" class="btn btn-primary px-4" [disabled]="loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              {{ loading ? 'Saving...' : 'Save Changes' }}
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>

</div>
